<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect x="2" y="2" width="124" height="124" rx="26" fill="#FFFFFF"/>
  <rect x="2" y="2" width="124" height="124" rx="26" fill="none" stroke="#2d70de" stroke-width="2"/>

  <!-- conductor: one continuous silhouette, arm raised mid-downbeat -->
  <g fill="#2d70de">
    <path d="M 28 108 C 28 82 41 68 58 68 C 75 68 88 82 88 108 Z"/>
    <rect x="52.5" y="44" width="11" height="28"/>
    <circle cx="58" cy="38" r="13"/>
  </g>
  <path d="M 80 82 C 88 70 94 58 100 46" fill="none" stroke="#2d70de" stroke-width="9" stroke-linecap="round"/>

  <!-- collar -->
  <path d="M 48.5 68.5 L 58 87 L 67.5 68.5 Z" fill="#FFFFFF"/>

  <!-- bowtie -->
  <g fill="#17252e">
    <path d="M 56 72.5 L 47.5 68 L 47.5 77 Z"/>
    <path d="M 60 72.5 L 68.5 68 L 68.5 77 Z"/>
    <circle cx="58" cy="72.5" r="2.6"/>
  </g>

  <!-- baton -->
  <path d="M 103 42 L 118 22" fill="none" stroke="#17252e" stroke-width="4" stroke-linecap="round"/>
</svg>
