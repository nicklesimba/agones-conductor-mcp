# Least-privilege RBAC for agones-conductor-mcp: grants exactly the verbs
# its Kubernetes-facing tools use, nothing more. list_clusters and the three
# open_match_* tools make no Kubernetes API calls and need no permissions
# here.
#
# If deploying in-cluster, bind this ClusterRole to the Pod's service
# account with a ClusterRoleBinding (or a RoleBinding scoped to one
# namespace, if this server only ever targets a single namespace).
# If deploying out-of-cluster via kubeconfig, apply an equivalent grant to
# whichever identity that kubeconfig authenticates as.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agones-conductor-mcp
rules:
  - apiGroups: ["agones.dev"]
    resources: ["fleets"]
    verbs: ["get", "list", "create", "update", "delete"]
  - apiGroups: ["agones.dev"]
    resources: ["gameservers"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["agones.dev"]
    resources: ["gameserversets"]
    verbs: ["list"]
  - apiGroups: ["autoscaling.agones.dev"]
    resources: ["fleetautoscalers"]
    verbs: ["get", "list", "create", "update", "delete"]
  - apiGroups: ["allocation.agones.dev"]
    resources: ["gameserverallocations"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Used only by agones_health, which lists label-selected pods in the
  # Agones install namespace (agones-system by default). If cluster-wide pod
  # listing is unacceptable, replace this rule with an equivalent namespaced
  # Role + RoleBinding in that one namespace.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
